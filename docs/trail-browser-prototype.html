<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Forager · Trail Browser</title>
<style>
  :root{
    --bg:        #f4ece1;   /* warm cream */
    --bg-2:      #efe4d5;
    --surface:   #fbf6ee;   /* card surface */
    --surface-2: #f6eee2;
    --ink:       #3d352b;   /* warm near-black */
    --ink-soft:  #6f6455;
    --ink-faint: #a99d8b;
    --line:      #e4d8c6;
    --accent:    #c8734b;   /* terracotta */
    --accent-2:  #d99a5b;   /* amber */
    --sage:      #8a9a6f;   /* muted green */
    --dusty:     #9a8ba8;   /* dusty violet */
    --shadow:    0 6px 22px rgba(90,70,45,.10);
    --shadow-sm: 0 2px 8px rgba(90,70,45,.08);
    --radius:    16px;
    --pane-w:    380px;
    font-synthesis:none;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;margin:0}
  body{
    font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,"Segoe UI",system-ui,serif;
    background:
      radial-gradient(120% 80% at 100% 0%, #f7efe3 0%, rgba(247,239,227,0) 55%),
      radial-gradient(140% 90% at 0% 100%, #efe2d0 0%, rgba(239,226,208,0) 50%),
      var(--bg);
    color:var(--ink);
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }

  /* ---------- App shell ---------- */
  .app{display:flex;flex-direction:column;height:100%;}

  header.topbar{
    display:flex;align-items:center;gap:12px;
    padding:12px 18px;
    background:rgba(251,246,238,.72);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
    z-index:30;flex:0 0 auto;
  }
  .brand{display:flex;align-items:center;gap:9px;font-weight:600;letter-spacing:.2px;}
  .brand .mark{
    width:26px;height:26px;border-radius:9px;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));
    display:grid;place-items:center;color:#fff;font-size:15px;box-shadow:var(--shadow-sm);
  }
  .brand small{display:block;font-size:11px;color:var(--ink-faint);font-weight:400;letter-spacing:.4px;}
  .topbar .spacer{flex:1}
  .icon-btn{
    border:1px solid var(--line);background:var(--surface);
    color:var(--ink-soft);cursor:pointer;
    width:40px;height:40px;border-radius:12px;font-size:17px;
    display:grid;place-items:center;transition:.18s;
  }
  .icon-btn:hover{background:var(--surface-2);color:var(--ink);transform:translateY(-1px)}
  .icon-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

  /* ---------- Body layout ---------- */
  .body{flex:1;display:flex;min-height:0;position:relative;}

  /* ---------- Left panel (trails) ---------- */
  .drawer{
    width:300px;flex:0 0 300px;
    background:var(--surface);
    border-right:1px solid var(--line);
    display:flex;flex-direction:column;
    transition:margin-left .32s cubic-bezier(.4,.0,.2,1);
    z-index:20;
  }
  .drawer.collapsed{margin-left:-300px}
  .drawer h2{margin:0;padding:18px 18px 6px;font-size:16px;}
  .drawer .sub{padding:0 18px 12px;color:var(--ink-faint);font-size:12px;}
  .trail-list{flex:1;overflow-y:auto;padding:6px 12px 12px;display:flex;flex-direction:column;gap:10px;}
  .trail{
    background:var(--surface-2);border:1px solid var(--line);border-radius:14px;
    padding:12px 13px;cursor:pointer;transition:.18s;position:relative;
  }
  .trail:hover{transform:translateY(-1px);box-shadow:var(--shadow-sm)}
  .trail.current{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset;}
  .trail .t-title{font-weight:600;font-size:14px;outline:none;}
  .trail .t-title:focus{background:#fff;border-radius:6px;box-shadow:0 0 0 2px var(--accent-2)}
  .trail .t-desc{color:var(--ink-soft);font-size:12px;margin-top:3px;line-height:1.45;outline:none;}
  .trail .t-desc:focus{background:#fff;border-radius:6px;box-shadow:0 0 0 2px var(--accent-2)}
  .trail .t-meta{display:flex;align-items:center;gap:6px;margin-top:9px;font-size:11px;color:var(--ink-faint);}
  .dot{width:5px;height:5px;border-radius:50%;background:var(--accent-2);display:inline-block}
  .save-collection{
    margin-top:10px;width:100%;border:none;cursor:pointer;
    background:linear-gradient(135deg,var(--sage),#9ca87e);
    color:#fff;font-family:inherit;font-size:12.5px;font-weight:600;
    padding:9px;border-radius:10px;transition:.18s;letter-spacing:.2px;
  }
  .save-collection:hover{filter:brightness(1.05);transform:translateY(-1px)}
  .drawer .drawer-actions{padding:12px;border-top:1px solid var(--line);}
  .new-trail{
    width:100%;border:1px dashed var(--ink-faint);background:transparent;color:var(--ink-soft);
    padding:10px;border-radius:12px;cursor:pointer;font-family:inherit;font-size:13px;transition:.18s;
  }
  .new-trail:hover{border-color:var(--accent);color:var(--accent)}

  /* ---------- Panes region ---------- */
  .panes-wrap{flex:1;min-width:0;display:flex;flex-direction:column;}
  .panes{
    flex:1;display:flex;gap:0;overflow-x:auto;overflow-y:hidden;
    scroll-behavior:smooth;scroll-snap-type:x proximity;
    padding:16px;padding-bottom:8px;
  }
  .panes::-webkit-scrollbar{height:9px}
  .panes::-webkit-scrollbar-thumb{background:var(--line);border-radius:20px}

  .pane{
    flex:0 0 var(--pane-w);width:var(--pane-w);
    display:flex;flex-direction:column;min-height:0;
    background:var(--surface);
    border:1px solid var(--line);border-radius:var(--radius);
    margin-right:16px;overflow:hidden;box-shadow:var(--shadow);
    scroll-snap-align:start;
    animation:slideIn .34s cubic-bezier(.2,.7,.2,1);
  }
  @keyframes slideIn{from{opacity:0;transform:translateX(26px) scale(.98)}to{opacity:1;transform:none}}
  .pane-head{
    padding:14px 15px 10px;border-bottom:1px solid var(--line);
    background:var(--surface-2);flex:0 0 auto;
  }
  .pane-eyebrow{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--ink-faint);letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px;}
  .pane-body{flex:1;overflow-y:auto;padding:12px;}
  .pane-body::-webkit-scrollbar{width:8px}
  .pane-body::-webkit-scrollbar-thumb{background:var(--line);border-radius:20px}

  /* ---------- Featured (first pane) ---------- */
  .featured-head{display:flex;align-items:center;justify-content:space-between;margin:2px 2px 10px;}
  .featured-head .label{font-size:13px;color:var(--ink-soft);font-weight:600;}
  .mini-btn{border:1px solid var(--line);background:var(--surface);color:var(--ink-soft);
    border-radius:9px;padding:5px 10px;font-size:12px;cursor:pointer;font-family:inherit;transition:.18s;display:inline-flex;gap:5px;align-items:center;}
  .mini-btn:hover{background:var(--surface-2);color:var(--ink)}
  .featured{display:flex;flex-direction:column;gap:10px;margin-bottom:8px;}
  .divider{height:1px;background:var(--line);margin:6px 2px 12px;position:relative;}
  .divider span{position:absolute;top:-9px;left:10px;background:var(--surface);padding:0 8px;font-size:11px;color:var(--ink-faint);letter-spacing:.4px;}

  /* ---------- Link card ---------- */
  .card{
    display:flex;gap:11px;padding:10px;border-radius:13px;
    background:var(--surface);border:1px solid var(--line);cursor:pointer;
    transition:.16s;position:relative;align-items:stretch;
  }
  .card:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:#dcccb4}
  .card.featured-card{background:linear-gradient(180deg,#fffaf2,#f8f0e3);}
  .thumb{
    flex:0 0 64px;width:64px;height:64px;border-radius:10px;overflow:hidden;
    display:grid;place-items:center;font-size:26px;color:#fff;
    box-shadow:inset 0 0 0 1px rgba(0,0,0,.04);
  }
  .card-main{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;}
  .card-title{font-weight:600;font-size:14px;line-height:1.25;margin:0 0 3px;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .card-desc{font-size:12px;color:var(--ink-soft);line-height:1.4;margin:0;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .card-meta{display:flex;align-items:center;gap:6px;margin-top:6px;font-size:11px;color:var(--ink-faint);}
  .rel-badge{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;padding:2px 7px;border-radius:20px;font-weight:600;letter-spacing:.2px;}
  .rel-mutual{background:#efe6d3;color:#a9803f}
  .rel-similar{background:#e6ecdb;color:#5f7040}
  .rel-connected{background:#e9e3ef;color:#6f5f86}
  .card-x{
    position:absolute;top:6px;right:6px;width:22px;height:22px;border-radius:50%;
    border:none;background:rgba(61,53,43,.06);color:var(--ink-soft);
    cursor:pointer;font-size:13px;line-height:1;display:grid;place-items:center;transition:.16s;opacity:0;
  }
  .card:hover .card-x{opacity:1}
  .card-x:hover{background:var(--accent);color:#fff}

  /* ---------- Compact link header in walked pane ---------- */
  .pane-head .card{cursor:default;background:var(--surface);}
  .pane-head .card:hover{transform:none;box-shadow:var(--shadow-sm);border-color:var(--line);}
  .hero-domain{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--ink-faint);}
  .hero-actions{display:flex;gap:7px;margin-top:9px;}
  .hero-actions button{border:1px solid var(--line);background:var(--surface);color:var(--ink-soft);
    padding:5px 12px;border-radius:9px;font-family:inherit;font-size:11.5px;cursor:pointer;transition:.16s;font-weight:600;}
  .hero-actions button:hover{background:var(--surface-2);color:var(--ink)}
  .hero-actions button.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .hero-actions button.primary:hover{filter:brightness(1.05)}

  /* ---------- Seed pane ---------- */
  .seed-card{position:relative;padding-right:44px;}
  .seed-card.locked{opacity:.94;cursor:default;}
  .seed-card:hover{transform:none;box-shadow:var(--shadow-sm);}
  .seed-tools{position:absolute;top:8px;right:8px;display:flex;flex-direction:column;gap:6px;}
  .seed-tool{width:26px;height:26px;border-radius:8px;border:1px solid var(--line);
    background:var(--surface);color:var(--ink-soft);cursor:pointer;font-size:14px;line-height:1;
    display:grid;place-items:center;transition:.16s;}
  .seed-tool:hover{background:var(--accent);color:#fff;border-color:var(--accent);transform:translateY(-1px);}
  .start-wander{
    width:100%;margin-top:14px;border:none;cursor:pointer;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));
    color:#fff;font-family:inherit;font-size:15px;font-weight:600;letter-spacing:.3px;
    padding:13px;border-radius:13px;box-shadow:var(--shadow);transition:.18s;
  }
  .start-wander:hover{filter:brightness(1.05);transform:translateY(-1px);}
  .start-wander:disabled{opacity:.5;cursor:not-allowed;filter:none;transform:none;}
  .seed-note{margin-top:12px;font-size:12px;color:var(--ink-faint);line-height:1.5;text-align:center;font-style:italic;}
  .results-title{display:flex;align-items:center;gap:9px;font-size:15px;font-weight:600;}
  .seed-stack{display:inline-flex;}
  .seed-stack .s-thumb{width:26px;height:26px;border-radius:8px;margin-right:-9px;
    border:2px solid var(--surface-2);display:grid;place-items:center;color:#fff;font-size:13px;}
  .seed-stack .s-thumb:last-child{margin-right:0;}

  /* ---------- Filter pills (attached to pane header) ---------- */
  .filters{display:flex;gap:7px;flex-wrap:wrap;padding-top:11px;margin-top:11px;border-top:1px solid var(--line);}
  .pill{
    border:1px solid var(--line);background:var(--surface-2);color:var(--ink-soft);
    padding:6px 12px;border-radius:20px;font-size:12px;cursor:pointer;font-family:inherit;
    display:inline-flex;align-items:center;gap:6px;transition:.16s;user-select:none;
  }
  .pill .swatch{width:8px;height:8px;border-radius:50%}
  .pill:hover{transform:translateY(-1px)}
  .pill.on{color:#fff;border-color:transparent}
  .pill.on.all{background:var(--ink);}
  .pill.on.mutual{background:var(--accent-2)}
  .pill.on.similar{background:var(--sage)}
  .pill.on.connected{background:var(--dusty)}
  .list-label{font-size:12px;color:var(--ink-faint);padding:12px 2px 6px;}
  .link-list{display:flex;flex-direction:column;gap:9px;}
  .empty{color:var(--ink-faint);font-size:12.5px;text-align:center;padding:26px 10px;font-style:italic;}

  /* ---------- Footer: walked path ---------- */
  footer.trail-bar{
    flex:0 0 auto;background:rgba(251,246,238,.85);backdrop-filter:blur(8px);
    border-top:1px solid var(--line);padding:9px 14px;z-index:15;
  }
  .trail-bar .tb-head{display:flex;align-items:center;gap:8px;margin-bottom:7px;font-size:11px;color:var(--ink-faint);letter-spacing:.4px;text-transform:uppercase;}
  .tb-head .steps{margin-left:auto;text-transform:none;letter-spacing:0;font-size:11px;}
  .path{display:flex;gap:8px;overflow-x:auto;padding-bottom:3px;}
  .path::-webkit-scrollbar{height:6px}
  .path::-webkit-scrollbar-thumb{background:var(--line);border-radius:20px}
  .step{
    flex:0 0 auto;display:flex;align-items:center;gap:8px;
    background:var(--surface);border:1px solid var(--line);border-radius:11px;
    padding:6px 8px;cursor:pointer;transition:.16s;position:relative;max-width:180px;
  }
  .step:hover{border-color:var(--accent);transform:translateY(-1px)}
  .step.active{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset}
  .step .s-thumb{width:26px;height:26px;border-radius:7px;flex:0 0 auto;display:grid;place-items:center;color:#fff;font-size:13px;}
  .step .s-title{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .step .s-x{border:none;background:transparent;color:var(--ink-faint);cursor:pointer;font-size:14px;padding:0 2px;line-height:1;flex:0 0 auto;}
  .step .s-x:hover{color:var(--accent)}
  .step .connector{color:var(--ink-faint);font-size:12px;}
  /* seed group chip — seeds shown "together" */
  .seed-group{background:linear-gradient(135deg,#f3e7d3,#efe1cd);border-color:#e3d0b0;padding:6px 12px 6px 9px;}
  .seed-group.active{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset;}
  .seed-group .seed-stack{display:inline-flex;}
  .seed-group .seed-stack .s-thumb{width:24px;height:24px;border-radius:7px;margin-right:-9px;
    border:2px solid #f1e4cf;display:grid;place-items:center;color:#fff;font-size:12px;}
  .seed-group .seed-stack .s-thumb:last-child{margin-right:0;}
  .seed-group .s-title{color:#a9803f;}
  .path-hint{color:var(--ink-faint);font-size:12.5px;font-style:italic;padding:6px 2px;}

  /* ---------- Scrim for mobile drawer ---------- */
  .scrim{position:absolute;inset:0;background:rgba(61,53,43,.28);z-index:19;opacity:0;pointer-events:none;transition:.25s;}
  .scrim.show{opacity:1;pointer-events:auto}

  .toast{
    position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fdf7ee;padding:11px 18px;border-radius:12px;font-size:13px;
    box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.3s;z-index:60;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* ---------- Mobile ---------- */
  @media (max-width:720px){
    :root{--pane-w:86vw}
    .drawer{position:absolute;top:0;bottom:0;left:0;box-shadow:var(--shadow);}
    .brand small{display:none}
    .panes{padding:10px}
    .pane{margin-right:10px}
    .step{max-width:150px}
  }
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <button class="icon-btn" id="drawerToggle" title="Trails">☰</button>
    <div class="brand">
      <span class="mark">✦</span>
      <div>Forager<small>trail browser</small></div>
    </div>
    <div class="spacer"></div>
    <button class="icon-btn" id="resetBtn" title="Restart trail">⟲</button>
  </header>

  <div class="body">
    <!-- Left panel: trails -->
    <aside class="drawer collapsed" id="drawer">
      <h2>Your Trails</h2>
      <div class="sub">Walking sessions you can name, revisit, and turn into Semble collections.</div>
      <div class="trail-list" id="trailList"></div>
      <div class="drawer-actions">
        <button class="new-trail" id="newTrail">＋ Start a new trail</button>
      </div>
    </aside>
    <div class="scrim" id="scrim"></div>

    <!-- Panes -->
    <div class="panes-wrap">
      <div class="panes" id="panes"></div>

      <footer class="trail-bar">
        <div class="tb-head">
          <span>◈ Walked path</span>
          <span class="steps" id="stepCount"></span>
        </div>
        <div class="path" id="path"></div>
      </footer>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   Mock data
   ============================================================ */
const PALETTES = [
  ['#c8734b','#e0a26a'],['#8a9a6f','#b4c08d'],['#9a8ba8','#c3b3d1'],
  ['#5f8a86','#8fbdb6'],['#c98a6b','#e8b98f'],['#b5794f','#d9a86f'],
  ['#7b8f9e','#a9c0cd'],['#a86f6f','#cf9c95']
];
const EMOJI = ['🍃','📜','🌿','🕯️','🗺️','🪶','🧭','🌾','📖','☕','🏞️','🎐','🪵','🌙','🔭','🫖'];

const RAW = [
  ["The Slow Web Movement","On building calmer, human-paced digital spaces that respect attention.","slowweb.org"],
  ["Notes on Forest Bathing","How shinrin-yoku restores focus and lowers the noise of the mind.","kinfolk.com"],
  ["A Field Guide to Wandering","Wayfinding without maps — trusting the path as it unfolds.","longreads.com"],
  ["The Garden and the Stream","Two metaphors for how we organize what we learn online.","hapgood.us"],
  ["Tools for Thought","A survey of software that helps us think in public and private.","tft.io"],
  ["On Keeping a Commonplace Book","The centuries-old practice of collecting fragments worth remembering.","austinkleon.com"],
  ["Digital Gardens Explained","Why more people are tending public knowledge gardens.","maggieappleton.com"],
  ["The Cozy Web","The soft, private middle layer between the open web and the void.","venkatesh.rao"],
  ["Wabi-Sabi for Interfaces","Designing for warmth, imperfection, and quiet delight.","designnotes.co"],
  ["Serendipity Engines","How the best browsing feels like a lucky walk in the woods.","increment.com"],
  ["Reading in the Age of Feeds","Reclaiming long attention from the scroll.","newyorker.com"],
  ["The Memex Revisited","Vannevar Bush's dream of associative trails, seventy years on.","theatlantic.com"],
  ["Trailblazing & Association","Following links the way memory actually works.","brainpickings.org"],
  ["A Pattern Language for Notes","Small composable structures for a lifetime of thinking.","patterns.dev"],
  ["The Ecology of Attention","Attention as a shared, cultivated commons.","aeon.co"],
  ["Handmade Software","In praise of tools made with care, by hand, for few.","handmade.network"],
  ["Quiet Corners of the Internet","A directory of calm, ad-free, lovingly-made websites.","quietplaces.web"],
  ["On Curation as Craft","Choosing well is its own creative act.","aperture.org"],
  ["The Long Now of Reading","Books and links that reward returning years later.","longnow.org"],
  ["Paths Through the Archive","Designing browsing that invites rather than optimizes.","walkerart.org"],
  ["Moss, Lichen & Slow Growth","What tiny organisms teach about patient accumulation.","emergence.mag"],
  ["The Well-Tended Bookmark","Bookmarks as seeds, not graves, for ideas.","pinboard.in"],
  ["Weaving Contexts Together","How ideas gain meaning from their neighbours.","context.garden"],
  ["Lantern Notes","Writing small lights to guide your future self.","lanterns.notes"]
];

let _id = 0;
const LINKS = RAW.map((r,i)=>({
  id: 'l'+(_id++),
  title:r[0], desc:r[1], domain:r[2],
  palette:PALETTES[i%PALETTES.length],
  emoji:EMOJI[i%EMOJI.length]
}));

// deterministic pseudo-relationships so every card has neighbours
function relatedFor(link){
  const idx = LINKS.findIndex(l=>l.id===link.id);
  const pick = (offset,count,rel)=>{
    const out=[];
    for(let k=1;k<=count;k++){
      const l = LINKS[(idx+offset+k*(rel==='mutual'?1:rel==='similar'?2:3))%LINKS.length];
      if(l.id!==link.id) out.push({...l, rel});
    }
    return out;
  };
  return [
    ...pick(1,4,'mutual'),
    ...pick(2,4,'similar'),
    ...pick(3,4,'connected')
  ];
}

const REL_META = {
  mutual:   {label:'Mutual collections', icon:'⬡', badge:'rel-mutual', swatch:'var(--accent-2)', short:'in a shared collection'},
  similar:  {label:'Similar',            icon:'≈', badge:'rel-similar', swatch:'var(--sage)',    short:'semantically similar'},
  connected:{label:'Connected',          icon:'↔', badge:'rel-connected',swatch:'var(--dusty)',  short:'explicitly connected'}
};

/* ============================================================
   State
   ============================================================ */
function today(){
  const d = new Date('2026-07-16T10:00:00'); // fixed for prototype determinism
  return d.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
}
let trails = [];
let currentTrailId = null;
let seeds = [];        // starting seed links (1–3), locked once wandering starts
let started = false;   // has the trail left the seed pane?
let path = [];         // walked links after the seeds (array of link objects)
// activeStep = pane child-index in focus: 0 = seed pane, 1 = seed-results pane,
//              i+2 = walked pane for path[i]
let activeStep = 0;

const SEED_MIN = 1, SEED_MAX = 3;
const PANE_SEED = 0, PANE_RESULTS = 1;      // fixed child indices
const paneOfStep = i => i + 2;              // path index -> pane child index

function randomSeeds(n=3){
  const pool=[...LINKS], out=[];
  for(let i=0;i<n && pool.length;i++) out.push(pool.splice(Math.floor(Math.random()*pool.length),1)[0]);
  return out;
}

function newTrail(){
  const t = {id:'t'+Math.floor(Math.random()*1e9), title:'Trail · '+today(), desc:today(),
             seeds:randomSeeds(), started:false, path:[], created:today()};
  trails.push(t); currentTrailId=t.id;
  seeds=[...t.seeds]; started=false; path=[]; activeStep=PANE_SEED;
  renderTrails(); renderPanes(); renderPath();
}
function currentTrail(){return trails.find(t=>t.id===currentTrailId)}

/* seed editing (only before wandering starts) */
function cycleSeed(i){
  const avail=LINKS.filter(l=>!seeds.some(s=>s.id===l.id));
  if(!avail.length) return;
  seeds[i]=avail[Math.floor(Math.random()*avail.length)];
  syncTrail(); renderPanes();
}
function removeSeed(i){
  if(seeds.length<=SEED_MIN) return;
  seeds.splice(i,1); syncTrail(); renderPanes();
}
function addSeed(){
  if(seeds.length>=SEED_MAX) return;
  const avail=LINKS.filter(l=>!seeds.some(s=>s.id===l.id));
  if(!avail.length) return;
  seeds.push(avail[Math.floor(Math.random()*avail.length)]);
  syncTrail(); renderPanes();
}

/* aggregate related links from every seed, deduped, seeds excluded */
function relatedForSeeds(seedList){
  const seen=new Set(seedList.map(s=>s.id)), out=[];
  seedList.forEach(s=>relatedFor(s).forEach(r=>{ if(!seen.has(r.id)){seen.add(r.id);out.push(r);} }));
  return out;
}

/* ============================================================
   Rendering helpers
   ============================================================ */
function grad(p){return `linear-gradient(140deg,${p[0]},${p[1]})`}
function byId(id){return LINKS.find(l=>l.id===id)}

function cardEl(link,{featuredCard=false,rel=null,onRemove=null}={}){
  const el=document.createElement('div');
  el.className='card'+(featuredCard?' featured-card':'');
  const relHtml = rel? `<span class="rel-badge ${REL_META[rel].badge}">${REL_META[rel].icon} ${REL_META[rel].label.split(' ')[0]}</span>`:'';
  el.innerHTML=`
    <div class="thumb" style="background:${grad(link.palette)}">${link.emoji}</div>
    <div class="card-main">
      <p class="card-title">${link.title}</p>
      <p class="card-desc">${link.desc}</p>
      <div class="card-meta">${relHtml}<span>${link.domain}</span></div>
    </div>`;
  if(onRemove){
    const x=document.createElement('button');x.className='card-x';x.textContent='×';x.title='Remove';
    x.onclick=e=>{e.stopPropagation();onRemove();};
    el.appendChild(x);
  }
  el.onclick=()=>openLink(link);
  return el;
}

/* ---- Seed card (only in the seed pane) ---- */
function seedCardEl(link,i){
  const el=document.createElement('div');
  el.className='card seed-card'+(started?' locked':'');
  el.innerHTML=`
    <div class="thumb" style="background:${grad(link.palette)}">${link.emoji}</div>
    <div class="card-main">
      <p class="card-title">${link.title}</p>
      <p class="card-desc">${link.desc}</p>
      <div class="card-meta"><span class="rel-badge rel-mutual">🌱 seed</span><span>${link.domain}</span></div>
    </div>`;
  if(!started){
    const tools=document.createElement('div');tools.className='seed-tools';
    const cyc=document.createElement('button');cyc.className='seed-tool';cyc.title='Swap for another';cyc.textContent='⟳';
    cyc.onclick=e=>{e.stopPropagation();cycleSeed(i);};
    tools.appendChild(cyc);
    if(seeds.length>SEED_MIN){
      const x=document.createElement('button');x.className='seed-tool';x.title='Remove seed';x.textContent='×';
      x.onclick=e=>{e.stopPropagation();removeSeed(i);};
      tools.appendChild(x);
    }
    el.appendChild(tools);
  }
  return el;
}

/* ---- Seed pane (special first pane) ---- */
function renderSeedPane(){
  const pane=document.createElement('div');pane.className='pane seed-pane';
  const head=document.createElement('div');head.className='pane-head';
  head.innerHTML = started
    ? `<div class="pane-eyebrow"><span>🌱 Seeds · locked</span></div>
       <div style="font-size:15px;font-weight:600">Your starting seeds</div>`
    : `<div class="pane-eyebrow"><span>🌱 Seed the trail</span></div>
       <div style="font-size:15px;font-weight:600">Pick your seed links to begin</div>`;
  pane.appendChild(head);

  const body=document.createElement('div');body.className='pane-body';
  const wrap=document.createElement('div');wrap.className='featured';
  seeds.forEach((s,i)=>wrap.appendChild(seedCardEl(s,i)));

  if(!started && seeds.length<SEED_MAX){
    const add=document.createElement('button');add.className='new-trail';add.style.padding='10px';
    add.textContent='＋ Add a seed';add.onclick=addSeed;
    wrap.appendChild(add);
  }
  body.appendChild(wrap);

  if(started){
    const note=document.createElement('div');note.className='seed-note';
    note.textContent='Seeds are locked for this trail. Start a new trail to choose different seeds.';
    body.appendChild(note);
  } else {
    const go=document.createElement('button');go.className='start-wander';
    go.innerHTML='Start wandering →';
    go.disabled = seeds.length<SEED_MIN;
    go.onclick=startWandering;
    body.appendChild(go);
    const hint=document.createElement('div');hint.className='seed-note';
    hint.textContent='Cycle (⟳) or remove seeds — keep 1 to 3. They become the roots of your walk.';
    body.appendChild(hint);
  }
  pane.appendChild(body);
  return pane;
}

/* ---- Shared: filter pills (for the header) + interwoven related list (for
        the body). Returns {filters, list} so callers can place them apart. ---- */
function relatedSection(rels,label){
  const state={filter:'all'};
  const filters=document.createElement('div');filters.className='filters';
  const defs=[
    ['all','All','var(--ink)'],
    ['mutual','Mutual',REL_META.mutual.swatch],
    ['similar','Similar',REL_META.similar.swatch],
    ['connected','Connected',REL_META.connected.swatch]
  ];
  const listWrap=document.createElement('div');listWrap.className='link-list';
  function draw(){
    listWrap.innerHTML='';
    const items = state.filter==='all'? rels : rels.filter(r=>r.rel===state.filter);
    let ordered=items;
    if(state.filter==='all'){
      const m=items.filter(r=>r.rel==='mutual'),s=items.filter(r=>r.rel==='similar'),c=items.filter(r=>r.rel==='connected');
      ordered=[];const max=Math.max(m.length,s.length,c.length);
      for(let i=0;i<max;i++){if(m[i])ordered.push(m[i]);if(s[i])ordered.push(s[i]);if(c[i])ordered.push(c[i]);}
    }
    if(!ordered.length){const e=document.createElement('div');e.className='empty';e.textContent='No links in this thread yet.';listWrap.appendChild(e);return;}
    ordered.forEach(r=>listWrap.appendChild(cardEl(r,{rel:r.rel})));
  }
  defs.forEach(([key,lab,sw])=>{
    const p=document.createElement('div');p.className='pill'+(key==='all'?' on all':'');
    p.dataset.key=key;
    p.innerHTML=`<span class="swatch" style="background:${sw}"></span>${lab}`;
    p.onclick=()=>{state.filter=key;filters.querySelectorAll('.pill').forEach(x=>x.className='pill');p.className='pill on '+key;draw();};
    filters.appendChild(p);
  });
  const list=document.createElement('div');
  const ll=document.createElement('div');ll.className='list-label';ll.textContent=label;
  list.appendChild(ll);
  list.appendChild(listWrap);
  draw();
  return {filters, list};
}

/* ---- Seed-results pane (first wandering pane, no hero card) ---- */
function renderResultsPane(){
  const pane=document.createElement('div');pane.className='pane';
  const head=document.createElement('div');head.className='pane-head';
  const thumbs=seeds.map(s=>`<span class="s-thumb" style="background:${grad(s.palette)}">${s.emoji}</span>`).join('');
  head.innerHTML=`
    <div class="pane-eyebrow"><span>◷ From your seeds</span></div>
    <div class="results-title">
      <span class="seed-stack">${thumbs}</span>
      <span>Where ${seeds.length} seed${seeds.length===1?'':'s'} lead</span>
    </div>`;
  const {filters,list}=relatedSection(relatedForSeeds(seeds),'Branching out →');
  head.appendChild(filters);
  pane.appendChild(head);
  const body=document.createElement('div');body.className='pane-body';
  body.appendChild(list);
  pane.appendChild(body);
  return pane;
}

/* ---- Walked pane (a clicked link + related list) ---- */
function renderLinkPane(link,depth){
  const pane=document.createElement('div');pane.className='pane';
  pane.dataset.depth=depth;
  const head=document.createElement('div');head.className='pane-head';
  head.innerHTML=`
    <div class="pane-eyebrow"><span>◷ Step ${depth}</span></div>
    <div class="card">
      <div class="thumb" style="background:${grad(link.palette)}">${link.emoji}</div>
      <div class="card-main">
        <p class="card-title">${link.title}</p>
        <p class="card-desc">${link.desc}</p>
        <div class="card-meta"><span class="hero-domain">🔗 ${link.domain}</span></div>
      </div>
    </div>
    <div class="hero-actions">
      <button class="primary">Open ↗</button>
      <button data-act="save">＋ Save</button>
    </div>`;
  head.querySelector('[data-act="save"]').onclick=()=>toast('Saved to “'+(currentTrail()?.title||'trail')+'”');
  const {filters,list}=relatedSection(relatedFor(link),'Where this leads →');
  head.appendChild(filters);
  pane.appendChild(head);
  const body=document.createElement('div');body.className='pane-body';
  body.appendChild(list);
  pane.appendChild(body);
  return pane;
}

/* ============================================================
   Navigation
   ============================================================ */
// Lock the seeds and open the first wandering (results) pane.
function startWandering(){
  if(seeds.length<SEED_MIN) return;
  started=true; activeStep=PANE_RESULTS;
  syncTrail(); renderPanes(); renderPath();
  requestAnimationFrame(()=>scrollToPane(PANE_RESULTS));
}
// Selecting a card always appends to the END of the trail — even when you
// clicked it from an earlier pane you'd navigated back to.
function openLink(link){
  if(!started) return;             // seed pane cards aren't clickable
  path.push(link);
  activeStep = paneOfStep(path.length-1);
  syncTrail();
  renderPanes(); renderPath();
  requestAnimationFrame(()=>scrollToPane(activeStep));
}
// Footer navigation: just move focus to that pane. Does NOT modify the trail —
// every link after it stays intact.
function navigateTo(paneIndex){    // pane child-index
  activeStep = paneIndex;
  scrollToPane(paneIndex);
  renderPath();                     // refresh which chip is highlighted
}
function scrollToPane(paneIndex){
  const wrap=document.getElementById('panes');
  const pane=wrap.children[paneIndex];
  if(pane) pane.scrollIntoView({behavior:'smooth',inline:'start',block:'nearest'});
}
function removeStep(index){         // index into path
  const removedPane=paneOfStep(index);
  path.splice(index,1);
  if(activeStep>=paneOfStep(path.length)) activeStep=Math.max(PANE_RESULTS,paneOfStep(path.length-1));
  else if(activeStep>removedPane) activeStep--;
  syncTrail();
  renderPanes();renderPath();
}
function syncTrail(){const t=currentTrail();if(t){t.path=[...path];t.seeds=[...seeds];t.started=started;}}

/* ============================================================
   Renderers
   ============================================================ */
function renderPanes(){
  const wrap=document.getElementById('panes');wrap.innerHTML='';
  wrap.appendChild(renderSeedPane());                       // child 0
  if(started){
    wrap.appendChild(renderResultsPane());                  // child 1
    path.forEach((link,i)=>wrap.appendChild(renderLinkPane(link,i+1))); // child i+2
  }
}

function renderPath(){
  const bar=document.getElementById('path');bar.innerHTML='';
  const count=document.getElementById('stepCount');

  if(!started){
    count.textContent='choosing seeds';
    const hint=document.createElement('div');hint.className='path-hint';
    hint.textContent='🌱 Plant your seeds, then press “Start wandering”.';
    bar.appendChild(hint);
    return;
  }
  count.textContent = `${seeds.length} seed${seeds.length===1?'':'s'}`+(path.length?` · ${path.length} step${path.length===1?'':'s'}`:'');

  // seed group chip — the seeds sit "together"; navigates back to the seed pane
  const group=document.createElement('div');
  group.className='step seed-group'+((activeStep===PANE_SEED||activeStep===PANE_RESULTS)?' active':'');
  const stack=seeds.map(s=>`<span class="s-thumb" style="background:${grad(s.palette)}">${s.emoji}</span>`).join('');
  group.innerHTML=`<span class="seed-stack">${stack}</span><span class="s-title">Seeds</span>`;
  group.onclick=()=>navigateTo(PANE_SEED);
  bar.appendChild(group);

  path.forEach((link,i)=>{
    const conn=document.createElement('span');conn.className='connector';conn.textContent='›';
    bar.appendChild(conn);
    const paneIdx=paneOfStep(i);
    const step=document.createElement('div');step.className='step'+(paneIdx===activeStep?' active':'');
    step.innerHTML=`
      <div class="s-thumb" style="background:${grad(link.palette)}">${link.emoji}</div>
      <span class="s-title">${link.title}</span>`;
    const x=document.createElement('button');x.className='s-x';x.textContent='×';x.title='Remove from trail';
    x.onclick=e=>{e.stopPropagation();removeStep(i);};
    step.querySelector('.s-title').onclick=()=>navigateTo(paneIdx);
    step.querySelector('.s-thumb').onclick=()=>navigateTo(paneIdx);
    step.appendChild(x);
    bar.appendChild(step);
  });
}

function renderTrails(){
  const list=document.getElementById('trailList');list.innerHTML='';
  trails.forEach(t=>{
    const el=document.createElement('div');el.className='trail'+(t.id===currentTrailId?' current':'');
    el.innerHTML=`
      <div class="t-title" contenteditable="true" spellcheck="false">${t.title}</div>
      <div class="t-desc" contenteditable="true" spellcheck="false">${t.desc}</div>
      <div class="t-meta"><span class="dot"></span> ${t.seeds.length} seed${t.seeds.length===1?'':'s'}${t.started?` · ${t.path.length} step${t.path.length===1?'':'s'}`:' · not started'} · ${t.created}</div>
      <button class="save-collection">✦ Save as Semble collection</button>`;
    el.querySelector('.t-title').onblur=e=>{t.title=e.target.textContent.trim()||('Trail · '+t.created);};
    el.querySelector('.t-desc').onblur=e=>{t.desc=e.target.textContent.trim();};
    el.querySelector('.save-collection').onclick=e=>{e.stopPropagation();toast('“'+t.title+'” saved as a Semble collection ✦');};
    el.onclick=e=>{
      if(e.target.isContentEditable) return;
      currentTrailId=t.id;
      seeds=[...t.seeds];started=t.started;path=[...t.path];
      activeStep = !started ? PANE_SEED : (path.length ? paneOfStep(path.length-1) : PANE_RESULTS);
      renderTrails();renderPanes();renderPath();
    };
    list.appendChild(el);
  });
}

/* ============================================================
   UI wiring
   ============================================================ */
const drawer=document.getElementById('drawer');
const scrim=document.getElementById('scrim');
function toggleDrawer(){
  drawer.classList.toggle('collapsed');
  document.getElementById('drawerToggle').classList.toggle('active',!drawer.classList.contains('collapsed'));
  if(window.innerWidth<=720) scrim.classList.toggle('show',!drawer.classList.contains('collapsed'));
}
document.getElementById('drawerToggle').onclick=toggleDrawer;
scrim.onclick=toggleDrawer;
document.getElementById('newTrail').onclick=newTrail;
document.getElementById('resetBtn').onclick=()=>{
  path=[];
  activeStep = started ? PANE_RESULTS : PANE_SEED;
  syncTrail();renderPanes();renderPath();
  requestAnimationFrame(()=>scrollToPane(activeStep));
  toast(started?'Steps cleared — back to your seeds':'Trail cleared');
};

let toastTimer;
function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2400);
}

/* ============================================================
   Boot
   ============================================================ */
(function init(){
  newTrail();                    // creates first trail with 3 random seeds
  trails[0].title='Morning wander';
  trails[0].desc='Following the calm-web thread from a slow-reading pick.';
  renderTrails();
})();
</script>
